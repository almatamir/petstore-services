# Requires an nginx Ingress Controller installed in the cluster
# (e.g. kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: petstore-ingress
  namespace: petstore
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /store1(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: pet-store1
                port:
                  number: 8000
          - path: /store2(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: pet-store2
                port:
                  number: 8000
          - path: /orders(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: pet-order
                port:
                  number: 8080
