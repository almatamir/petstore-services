upstream pet_order {
    server pet-order:8080;
}

server {
    listen 80;

    # Docker's internal DNS — required so nginx resolves pet-store<N> at
    # request time rather than startup (upstream variables need a resolver).
    resolver 127.0.0.11 valid=10s;

    # Dynamic store routing: /store<id>/... → pet-store<id>:8000/...
    # Adding a new store requires zero nginx changes — just bring up the container.
    location ~ ^/store(\d+)/(.*)$ {
        set $store_id   $1;
        set $store_path $2;
        proxy_pass http://pet-store$store_id:8000/$store_path$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route /orders/... → pet-order (strips the /orders prefix)
    location /orders/ {
        rewrite ^/orders/(.*) /$1 break;
        proxy_pass http://pet_order;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
