upstream pet_store_1 {
    server pet-store1:8000;
}

upstream pet_store_2 {
    server pet-store2:8000;
}

upstream pet_order {
    server pet-order:8080;
}

server {
    listen 80;

    # Route /store1/... → pet-store1 (strips the /store1 prefix)
    location /store1/ {
        rewrite ^/store1/(.*) /$1 break;
        proxy_pass http://pet_store_1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route /store2/... → pet-store2 (strips the /store2 prefix)
    location /store2/ {
        rewrite ^/store2/(.*) /$1 break;
        proxy_pass http://pet_store_2;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route /orders/... → pet-order (strips the /orders prefix)
    location /orders/ {
        rewrite ^/orders/(.*) /$1 break;
        proxy_pass http://pet_order;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
